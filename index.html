<link href="https://fonts.googleapis.com/css?family=Orbitron:700|Rajdhani:500,700" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<div class="widget">

  <!-- Segment name labels sitting above the bar -->
  <div class="seg-names" id="segNames"></div>

  <!-- Multi-color progress bar: one block per segment -->
  <div class="bar-outer" id="barOuter"></div>

  <!-- Bottom row: countdown timer + current section label -->
  <div class="time-row">
    <div class="time-left" id="timeLeft">00:00</div>
    <div class="seg-label" id="segLabel">—</div>
  </div>

</div>

<script src="script.js"></script>
